name: 🐧 Linux Build

on:
  release:
    types: [created]
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libcairo-gobject2 \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libsoup2.4-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: Build Linux Application
        run: cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Find built executable
        id: find-executable
        run: |
          EXECUTABLE=$(find src-tauri/target/x86_64-unknown-linux-gnu/release -name "llm-chat" -type f | head -1)
          if [ -f "$EXECUTABLE" ]; then
            echo "executable_path=$EXECUTABLE" >> $GITHUB_OUTPUT
            echo "Linux executable built: $EXECUTABLE"
            ls -la "$EXECUTABLE"
          else
            echo "Linux build failed - no executable found"
            exit 1
          fi

      - name: Upload Linux Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-linux-x86_64
          path: ${{ steps.find-executable.outputs.executable_path }}
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.find-executable.outputs.executable_path }}
          asset_name: llm-chat-linux-x86_64
          asset_content_type: application/octet-stream

      - name: Build Summary
        run: |
          echo "✅ Linux build completed successfully!"
          echo "📦 Executable: ${{ steps.find-executable.outputs.executable_path }}"
          echo "🚀 Uploaded as artifact: llm-chat-linux-x86_64"
