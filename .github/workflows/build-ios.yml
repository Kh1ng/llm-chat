name: 📱 iOS Build

on:
  release:
    types: [created]
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Add iOS targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add x86_64-apple-ios

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ios-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ios-cargo-

      - name: Initialize iOS project
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            cargo tauri ios init
          fi

      - name: Build iOS Application
        run: cargo tauri ios build

      - name: Find built files
        id: find-files
        run: |
          # Find the Xcode archive/app
          IPA_FILE=$(find src-tauri/gen/apple -name "*.ipa" -type f | head -1)
          APP_FILE=$(find src-tauri/gen/apple -name "*.app" -type d | head -1)
          
          if [ -f "$IPA_FILE" ]; then
            echo "ipa_path=$IPA_FILE" >> $GITHUB_OUTPUT
            echo "iOS IPA built: $IPA_FILE"
            ls -la "$IPA_FILE"
          fi
          
          if [ -d "$APP_FILE" ]; then
            echo "app_path=$APP_FILE" >> $GITHUB_OUTPUT
            echo "iOS App built: $APP_FILE"
            ls -la "$APP_FILE"
          fi
          
          if [ ! -f "$IPA_FILE" ] && [ ! -d "$APP_FILE" ]; then
            echo "iOS build may have completed without generating distributable files"
            echo "This is normal for unsigned iOS builds"
            # Don't exit with error for iOS builds
          fi

      - name: Upload iOS IPA Artifact
        if: steps.find-files.outputs.ipa_path
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-ios-ipa
          path: ${{ steps.find-files.outputs.ipa_path }}
          retention-days: 30

      - name: Upload iOS App Artifact
        if: steps.find-files.outputs.app_path
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-ios-app
          path: ${{ steps.find-files.outputs.app_path }}
          retention-days: 30

      - name: Upload IPA to Release
        if: github.event_name == 'release' && steps.find-files.outputs.ipa_path
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.find-files.outputs.ipa_path }}
          asset_name: llm-chat-ios.ipa
          asset_content_type: application/octet-stream

      - name: Build Summary
        run: |
          echo "✅ iOS build completed successfully!"
          if [ -n "${{ steps.find-files.outputs.ipa_path }}" ]; then
            echo "📦 IPA: ${{ steps.find-files.outputs.ipa_path }}"
          fi
          if [ -n "${{ steps.find-files.outputs.app_path }}" ]; then
            echo "📦 App Bundle: ${{ steps.find-files.outputs.app_path }}"
          fi
          echo "📱 Note: iOS builds may require code signing for distribution"
