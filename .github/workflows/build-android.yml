name: 🤖 Android Build

on:
  release:
    types: [created]
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager "ndk;25.2.9519653"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            android-cargo-

      - name: Set up environment variables
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Initialize Tauri Android project
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            cargo tauri android init
          fi

      - name: Build Android APK
        run: |
          cargo tauri android build --apk --no-default-features
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Find and prepare APK files
        id: find-apks
        run: |
          # Find all APK files
          UNIVERSAL_APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*universal*.apk" -type f | head -1)
          ARM64_APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*arm64*.apk" -type f | head -1)
          
          # If we found a universal APK, use that as primary
          if [ -f "$UNIVERSAL_APK" ]; then
            PRIMARY_APK="$UNIVERSAL_APK"
            cp "$UNIVERSAL_APK" "llm-chat-android-universal.apk"
            echo "apk_path=llm-chat-android-universal.apk" >> $GITHUB_OUTPUT
            echo "apk_name=llm-chat-android-universal.apk" >> $GITHUB_OUTPUT
          elif [ -f "$ARM64_APK" ]; then
            PRIMARY_APK="$ARM64_APK" 
            cp "$ARM64_APK" "llm-chat-android-arm64.apk"
            echo "apk_path=llm-chat-android-arm64.apk" >> $GITHUB_OUTPUT
            echo "apk_name=llm-chat-android-arm64.apk" >> $GITHUB_OUTPUT
          else
            # Find any APK as fallback
            PRIMARY_APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
            if [ -f "$PRIMARY_APK" ]; then
              cp "$PRIMARY_APK" "llm-chat-android.apk"
              echo "apk_path=llm-chat-android.apk" >> $GITHUB_OUTPUT
              echo "apk_name=llm-chat-android.apk" >> $GITHUB_OUTPUT
            fi
          fi
          
          if [ -f "$PRIMARY_APK" ]; then
            echo "Android APK built successfully: $PRIMARY_APK"
            ls -la "$PRIMARY_APK"
            ls -la llm-chat-android*.apk 2>/dev/null || true
          else
            echo "Android build failed - no APK found!"
            find src-tauri/gen/android -name "*.apk" -type f || echo "No APK files found anywhere"
            exit 1
          fi

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-android-apk
          path: ${{ steps.find-apks.outputs.apk_path }}
          retention-days: 30

      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.find-apks.outputs.apk_path }}
          asset_name: ${{ steps.find-apks.outputs.apk_name }}
          asset_content_type: application/vnd.android.package-archive

      - name: Build Summary
        run: |
          echo "✅ Android build completed successfully!"
          echo "📦 APK: ${{ steps.find-apks.outputs.apk_path }}"
          echo "🚀 Uploaded as artifact: llm-chat-android-apk"
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "📱 Also uploaded to release assets"
          fi
