name: Android Release Build

on:
  # Trigger on release creation
  release:
    types: [created]
  # Allow manual triggering
  workflow_dispatch:
  # Trigger on pushes to main branch (optional - remove if you don't want automatic builds)
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager "ndk;25.2.9519653"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up environment variables
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Initialize Tauri Android project (if not already done)
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            cargo tauri android init
          fi

      - name: Build Android APK
        run: |
          cargo tauri android build --apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Find APK files
        id: find-apks
        run: |
          APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          if [ -f "$APK_PATH" ]; then
            echo "APK found: $APK_PATH"
            ls -la "$APK_PATH"
          else
            echo "No APK found!"
            find src-tauri/gen/android -name "*.apk" -type f || echo "No APK files found anywhere"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-android-apk
          path: ${{ steps.find-apks.outputs.apk_path }}
          retention-days: 30

      # Optional: Upload to release if this was triggered by a release
      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.find-apks.outputs.apk_path }}
          asset_name: llm-chat-android.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Build Info
        run: |
          echo "🎉 Android build completed successfully!"
          echo "📱 APK Location: ${{ steps.find-apks.outputs.apk_path }}"
          echo "💾 APK uploaded as artifact: llm-chat-android-apk"
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "🚀 APK also uploaded to release assets"
          fi
