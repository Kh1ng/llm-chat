name: 🪟 Windows Build

on:
  release:
    types: [created]
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Build Windows Application
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Find built files
        id: find-files
        shell: bash
        run: |
          # Find the MSI installer
          MSI_FILE=$(find src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi -name "*.msi" -type f | head -1)
          # Find the executable
          EXE_FILE=$(find src-tauri/target/x86_64-pc-windows-msvc/release -name "*.exe" -type f | head -1)
          
          if [ -f "$MSI_FILE" ]; then
            echo "msi_path=$MSI_FILE" >> $GITHUB_OUTPUT
            echo "Windows MSI built: $MSI_FILE"
            ls -la "$MSI_FILE"
          fi
          
          if [ -f "$EXE_FILE" ]; then
            echo "exe_path=$EXE_FILE" >> $GITHUB_OUTPUT
            echo "Windows EXE built: $EXE_FILE"
            ls -la "$EXE_FILE"
          fi
          
          if [ ! -f "$MSI_FILE" ] && [ ! -f "$EXE_FILE" ]; then
            echo "Windows build failed - no installer or executable found"
            exit 1
          fi

      - name: Upload Windows MSI Artifact
        if: steps.find-files.outputs.msi_path
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-windows-msi
          path: ${{ steps.find-files.outputs.msi_path }}
          retention-days: 30

      - name: Upload Windows EXE Artifact
        if: steps.find-files.outputs.exe_path
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-windows-exe
          path: ${{ steps.find-files.outputs.exe_path }}
          retention-days: 30

      - name: Upload MSI to Release
        if: github.event_name == 'release' && steps.find-files.outputs.msi_path
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.find-files.outputs.msi_path }}
          asset_name: llm-chat-windows-x86_64.msi
          asset_content_type: application/octet-stream

      - name: Build Summary
        run: |
          echo "✅ Windows build completed successfully!"
          if [ -n "${{ steps.find-files.outputs.msi_path }}" ]; then
            echo "📦 MSI Installer: ${{ steps.find-files.outputs.msi_path }}"
          fi
          if [ -n "${{ steps.find-files.outputs.exe_path }}" ]; then
            echo "📦 Executable: ${{ steps.find-files.outputs.exe_path }}"
          fi
        shell: bash
