name: CI - Build & Test

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run || echo "No tests configured"

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            test-cargo-

      - name: Run Rust tests
        run: cd src-tauri && cargo test

      - name: Check Rust formatting
        run: cd src-tauri && cargo fmt --check

      - name: Lint Rust code
        run: cd src-tauri && cargo clippy -- -D warnings

  build-desktop-dev:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: dev-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            dev-cargo-

      - name: Build Desktop App (Development)
        run: cargo tauri build --debug

      - name: Find built executable
        id: find-executable
        run: |
          EXECUTABLE=$(find src-tauri/target/debug -name "llm-chat" -type f | head -1)
          echo "executable_path=$EXECUTABLE" >> $GITHUB_OUTPUT
          if [ -f "$EXECUTABLE" ]; then
            echo "Debug build successful: $EXECUTABLE"
            ls -la "$EXECUTABLE"
          else
            echo "Debug build failed - no executable found"
            exit 1
          fi

      - name: Upload Development Build
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-linux-dev
          path: ${{ steps.find-executable.outputs.executable_path }}
          retention-days: 7

  build-android-dev:
    runs-on: ubuntu-latest
    needs: test
    # Only run Android builds on main branch or if explicitly requested
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || contains(github.event.pull_request.labels.*.name, 'build-android')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager "ndk;25.2.9519653"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Rust Android targets (ARM64 only for dev builds)
        run: rustup target add aarch64-linux-android

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: android-dev-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            android-dev-cargo-

      - name: Set up environment variables
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Initialize Tauri Android project (if not already done)
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            cargo tauri android init
          fi

      - name: Build Android APK (Debug - ARM64 only)
        run: |
          cargo tauri android build --debug --target aarch64
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Find APK file
        id: find-apk
        run: |
          APK_PATH=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "llm-chat-android-dev.apk"
            echo "apk_path=llm-chat-android-dev.apk" >> $GITHUB_OUTPUT
            echo "APK found: $APK_PATH"
            ls -la "llm-chat-android-dev.apk"
          else
            echo "No APK found!"
            find src-tauri/gen/android -name "*.apk" -type f || echo "No APK files found"
            exit 1
          fi

      - name: Upload Android Development APK
        uses: actions/upload-artifact@v4
        with:
          name: llm-chat-android-dev
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 7

  ci-summary:
    runs-on: ubuntu-latest
    needs: [test, build-desktop-dev, build-android-dev]
    if: always()
    
    steps:
      - name: CI Summary
        run: |
          echo "## 🔍 CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results:" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rust tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Code formatting: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Linting: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Development Builds:" >> $GITHUB_STEP_SUMMARY
          echo "- Linux Desktop: ${{ needs.build-desktop-dev.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build-android-dev.result }}" != "skipped" ]; then
            echo "- Android APK: ${{ needs.build-android-dev.result }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Android APK: skipped (add 'build-android' label to PR to build)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed - check the logs above" >> $GITHUB_STEP_SUMMARY
          fi
